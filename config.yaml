app:
  log_level: INFO
  review_expiry_seconds: 900
  user_agent: "ClankAndClaw/1.0 (+ops)"
  worker_loop_timeout_seconds: 90.0
  candidate_process_timeout_seconds: 20.0
  max_pending_notifications: 500
  deploy_prepare_timeout_seconds: 90.0
  deploy_execute_timeout_seconds: 180.0
  cleanup_enabled: true
  cleanup_interval_seconds: 900.0
  retention_candidates_days: 3
  retention_reviews_days: 7
  retention_deployments_days: 14
  retention_rewards_days: 30

x_detector:
  enabled: true
  poll_interval: 30.0
  keywords:
    - deploy
    - launch
  max_results: 20
  target_handles: ["bankrbot", "clankerdeploy"]
  query_terms: ["deploy", "launch", "contract", "ca", "token"]
  max_process_concurrency: 8
  max_query_concurrency: 3

farcaster_detector:
  enabled: true
  poll_interval: 35.0
  api_url: "https://api.neynar.com/v2/farcaster/cast/search/"
  api_key: ""  # prefer env: NEYNAR_API_KEY
  max_results: 20
  target_handles: ["bankr", "clanker"]
  query_terms: ["deploy", "launch", "contract", "ca", "token"]
  request_timeout_seconds: 20.0
  max_requests_per_minute: 45
  max_process_concurrency: 8
  max_query_concurrency: 2

gecko_detector:
  enabled: true
  poll_interval: 25.0
  api_base_url: "https://api.geckoterminal.com/api/v2"
  networks: ["base", "eth", "solana", "bsc"]
  max_results: 20
  max_pool_age_minutes: 120
  min_volume_m5_usd: 3000
  min_volume_m15_usd: 8000
  min_tx_count_m5: 12
  min_liquidity_usd: 12000
  max_requests_per_minute: 40
  request_timeout_seconds: 20.0
  base_target_sources: ["bankr", "doppler", "zora", "virtual", "uniswapv4", "clanker"]
  max_process_concurrency: 10

deployment:
  platform: clanker
  tax_bps: 1000
  # Optional fee split overrides (if omitted, tax_bps is used for both)
  # clanker_fee_bps: 1000
  # paired_fee_bps: 1000
  token_admin_enabled: true
  token_reward_enabled: true
  base_rpc_url: "https://mainnet.base.org"
  # clanker_node_modules_path: "/path/to/node_modules"  # override via CLANKER_NODE_MODULES_PATH
  # node_script_path: "/path/to/scripts/clanker_deploy.mjs"  # override via NODE_SCRIPT_PATH env var

stealth:
  enabled: true
  rotate_every: 50        # rotate UA after this many requests
  jitter_sigma_pct: 0.15  # gaussian σ as fraction of base wait interval
  jitter_min_ms: 200      # floor on jitter delay (ms)
  jitter_max_ms: 3000     # ceiling on jitter delay (ms)

# Telegram credentials (prefer env vars: TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID)
telegram:
  bot_token: ""
  chat_id: ""
  message_thread_id: null
  thread_review_id: null
  thread_deploy_id: null
  thread_claim_id: null
  thread_ops_id: null
  thread_alert_id: null
